name: LTE Handover Prediction CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    name: Reproduce pipeline & promote champion
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc

      # Cache the DVC run-cache directory.
      # Key includes hashes of all pipeline source files so the cache is
      # invalidated (and stages re-run) only when the code actually changes.
      - name: Cache DVC run-cache
        uses: actions/cache@v4
        with:
          path: .dvc/cache
          key: dvc-${{ runner.os }}-${{ hashFiles('dvc.yaml', 'src/**', 'simulate.py', 'requirements.txt') }}
          restore-keys: |
            dvc-${{ runner.os }}-

      - name: Reproduce DVC pipeline
        run: dvc repro

      - name: Promote best model
        run: python scripts/promote_best_model.py

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports
          path: reports/
          retention-days: 30

      - name: Upload champion model metadata
        uses: actions/upload-artifact@v4
        with:
          name: champion-metadata
          path: models/champion/metadata.json
          retention-days: 30
