name: LTE Handover Prediction CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    name: Reproduce pipeline & promote champion
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc

      - name: Initialize DVC
        run: dvc init --no-scm

      - name: Pull DVC-tracked data (if remote configured)
        run: dvc pull --run-cache || true

      - name: Reproduce DVC pipeline (features → train → evaluate)
        run: |
          # Skip simulate stage to avoid re-running the heavy simulation.
          # dataset.csv must already be tracked in DVC or committed directly.
          dvc repro features train evaluate

      - name: Promote best model
        run: python scripts/promote_best_model.py

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports
          path: reports/
          retention-days: 30

      - name: Upload champion model metadata
        uses: actions/upload-artifact@v4
        with:
          name: champion-metadata
          path: models/champion/metadata.json
          retention-days: 30
